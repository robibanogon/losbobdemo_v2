apiVersion: v1
kind: ConfigMap
metadata:
  name: los-config
  labels:
    app.kubernetes.io/part-of: loan-origination-system
data:
  # API Configuration
  api-url: "http://los-backend:3001/api"
  
  # Watsonx Configuration
  watsonx-api-url: "https://us-south.ml.cloud.ibm.com/ml/v1/text/generation?version=2023-05-29"
  watsonx-default-model: "llama-3-3-70b-instruct"
  
  # IBM Cloud Object Storage Configuration (Optional)
  ibm-cos-endpoint: "s3.us-south.cloud-object-storage.appdomain.cloud"
  ibm-cos-bucket-name: "loan-documents"
  
  # Application Configuration
  node-env: "production"

# Made with Bob
